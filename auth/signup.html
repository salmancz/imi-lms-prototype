<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: var(--bg); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }

  /* top strip */
  .sa-top {
    padding: 18px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(250, 246, 240, 0.92);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
  }
  .sa-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .sa-brand img { height: 28px; width: auto; display: block; }
  .sa-brand-text {
    font-family: var(--font-sans);
    font-size: var(--fs-h3);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .sa-brand-sub {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: var(--fs-body);
    color: var(--ink-soft);
    margin-left: 2px;
  }

  /* centered layout */
  .sa-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px 80px;
  }
  .sa-main { width: 100%; max-width: 480px; }

  /* auth card */
  .auth-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 44px 40px 36px;
    box-shadow: var(--shadow-card);
  }

  /* centered logo lockup at card top */
  .auth-lockup {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }
  .auth-lockup img { height: 38px; width: auto; display: block; }

  /* eyebrow + heading */
  .auth-eyebrow {
    font-family: var(--font-label);
    font-size: var(--fs-label);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 8px;
    text-align: center;
  }
  .auth-title {
    font-family: var(--font-sans);
    font-size: var(--fs-h1);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 6px;
    text-align: center;
  }
  .auth-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--ink-soft);
  }
  .auth-sub {
    font-size: var(--fs-body);
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 28px;
    text-align: center;
  }

  /* form field sizing */
  .auth-card .input { height: 46px; font-size: var(--fs-body); }
  .auth-card .field { margin-bottom: 20px; }
  .field label .req { color: var(--accent); margin-left: 2px; }

  /* name row */
  .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* primary CTA */
  .btn-full {
    width: 100%;
    justify-content: center;
    height: 48px;
    font-size: var(--fs-body);
    border-radius: var(--r-md);
  }

  /* consent checkbox row */
  .consent-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 22px;
    padding: 14px 16px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
  }
  .consent-row input[type="checkbox"] {
    margin-top: 2px;
    flex-shrink: 0;
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .consent-row label {
    font-size: var(--fs-body);
    color: var(--ink-soft);
    line-height: 1.5;
    cursor: pointer;
  }

  /* divider */
  .auth-divider {
    height: 1px;
    background: var(--line);
    margin: 24px 0 20px;
  }

  /* footer links */
  .auth-foot {
    font-size: var(--fs-body);
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.6;
  }
  .auth-foot a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .auth-foot a:hover { color: var(--accent); }
  .auth-foot + .auth-foot { margin-top: 8px; }
  .auth-foot.help a { font-weight: 500; color: var(--ink-soft); }
  .auth-foot.help a:hover { color: var(--ink); }

  /* legal strip */
  .auth-legal {
    margin-top: 28px;
    text-align: center;
    font-family: var(--font-label);
    font-size: var(--fs-label);
    letter-spacing: 0.04em;
    color: var(--ink-mute);
    line-height: 1.7;
  }
  .auth-legal a { color: var(--ink-soft); text-decoration: underline; text-underline-offset: 2px; }
  .auth-legal a:hover { color: var(--ink); }
  .auth-legal .sep { color: var(--ink-faint); margin: 0 7px; }
  .auth-legal .copy { display: block; margin-top: 8px; color: var(--ink-faint); font-size: var(--fs-label); }

  /* inline field error state */
  .input.is-error {
    border-color: var(--c-danger) !important;
    background: #FFF7F6;
    box-shadow: 0 0 0 3px rgba(193, 42, 28, 0.10);
  }
  .input.is-error:focus {
    border-color: var(--c-danger) !important;
    box-shadow: 0 0 0 4px rgba(193, 42, 28, 0.14);
  }
  .field-error {
    display: none;
    margin-top: 5px;
    font-family: var(--font-label);
    font-size: var(--fs-meta);
    font-weight: 500;
    color: var(--c-danger);
    line-height: 1.4;
  }
  .field-error.visible { display: block; }

  /* form-level alert (OTP-send failures, server errors) */
  .form-alert {
    display: none;
    margin-bottom: 16px;
    padding: 11px 14px;
    background: var(--c-danger-wash);
    border: 1px solid rgba(193, 42, 28, 0.22);
    border-radius: var(--r-sm);
    font-size: var(--fs-body);
    color: var(--c-danger);
    font-weight: 500;
    line-height: 1.45;
  }
  .form-alert.visible { display: block; }
</style>
</head>
<body>

<!-- top navigation strip -->
<div class="sa-top">
  <a class="sa-brand" href="../learning/dashboard.html">
    <img src="../img/imi-mark-ink.png" alt="IMI">
    <span class="sa-brand-text">IMI</span>
    <span class="sa-brand-sub">Learning</span>
  </a>
</div>

<!-- centered auth card -->
<div class="sa-wrap">
  <main class="sa-main">

    <div class="auth-card">

      <!-- logo lockup -->
      <a class="auth-lockup" href="../learning/dashboard.html">
        <img src="../img/imi-logo.png" alt="IMI">
      </a>

      <!-- heading -->
      <p class="auth-eyebrow">Create account</p>
      <h1 class="auth-title">Join <em>IMI</em></h1>
      <p class="auth-sub">We'll send a one-time code to verify your email.</p>

      <!-- name row -->
      <div class="name-row">
        <div class="field">
          <label for="su-first">First Name <span class="req">*</span></label>
          <input class="input" id="su-first" type="text" placeholder="First name" autocomplete="given-name" aria-describedby="err-first" aria-invalid="false">
          <span class="field-error" id="err-first" role="alert"></span>
        </div>
        <div class="field">
          <label for="su-last">Last Name <span class="req">*</span></label>
          <input class="input" id="su-last" type="text" placeholder="Last name" autocomplete="family-name" aria-describedby="err-last" aria-invalid="false">
          <span class="field-error" id="err-last" role="alert"></span>
        </div>
      </div>

      <!-- email field -->
      <div class="field">
        <label for="su-email">Email address <span class="req">*</span></label>
        <input class="input" id="su-email" type="email" placeholder="you@example.com" autocomplete="email" aria-describedby="err-email" aria-invalid="false">
        <span class="field-error" id="err-email" role="alert"></span>
      </div>

      <!-- country dropdown -->
      <div class="field">
        <label for="su-country">Country <span class="req">*</span></label>
        <select class="input" id="su-country" autocomplete="country-name" required aria-describedby="err-country" aria-invalid="false">
          <option value="">Select country...</option>
          <option value="OM">Oman</option>
          <option value="AE">UAE</option>
          <option value="SA">Saudi Arabia</option>
          <option value="QA">Qatar</option>
          <option value="KW">Kuwait</option>
          <option value="BH">Bahrain</option>
          <option value="OT">Other</option>
        </select>
        <span class="field-error" id="err-country" role="alert"></span>
      </div>

      <!-- form-level alert (OTP send failure, server errors) -->
      <div class="form-alert" id="su-form-alert" role="alert" aria-live="assertive"></div>

      <!-- marketing consent -->
      <div class="consent-row" id="consent-row">
        <input type="checkbox" id="marketing-consent" aria-describedby="err-consent" aria-invalid="false">
        <label for="marketing-consent">I agree to receive marketing communications from IMI by email. You must enable this consent to create an account.</label>
      </div>
      <span class="field-error" id="err-consent" role="alert" style="margin-top:-12px;margin-bottom:14px;display:none;"></span>

      <!-- primary CTA -->
      <button class="btn btn-primary btn-full" id="btn-signup" type="button">Send OTP &rarr;</button>

      <div class="auth-divider"></div>

      <!-- footer links -->
      <p class="auth-foot">Already have an account? <a href="login.html">Sign in</a></p>
      <p class="auth-foot help"><a href="../profile/help-center.html">Need help?</a></p>

      <!-- legal -->
      <div class="auth-legal">
        <a href="../profile/help-center.html">Privacy Policy</a><span class="sep">&middot;</span><a href="../profile/help-center.html">Terms of Service</a><span class="sep">&middot;</span><a href="../profile/help-center.html">Terms &amp; Conditions</a>
        <span class="copy">IMI 2025</span>
      </div>

    </div><!-- /auth-card -->
  </main>
</div>

<script>
(function () {
  var firstEl    = document.getElementById('su-first');
  var lastEl     = document.getElementById('su-last');
  var emailEl    = document.getElementById('su-email');
  var countryEl  = document.getElementById('su-country');
  var consentEl  = document.getElementById('marketing-consent');
  var consentRow = document.getElementById('consent-row');
  var formAlert  = document.getElementById('su-form-alert');
  var btn        = document.getElementById('btn-signup');

  /* --- per-field error helpers --- */
  function fieldErr(input, msgEl, msg) {
    input.classList.add('is-error');
    input.setAttribute('aria-invalid', 'true');
    msgEl.textContent = msg;
    msgEl.classList.add('visible');
    msgEl.style.display = 'block';
  }
  function fieldOk(input, msgEl) {
    input.classList.remove('is-error');
    input.setAttribute('aria-invalid', 'false');
    msgEl.textContent = '';
    msgEl.classList.remove('visible');
    msgEl.style.display = 'none';
  }

  /* --- form-level alert (OTP-send failures, server errors) --- */
  function showFormAlert(msg) {
    formAlert.textContent = msg;
    formAlert.classList.add('visible');
    formAlert.style.display = 'block';
  }
  function clearFormAlert() {
    formAlert.textContent = '';
    formAlert.classList.remove('visible');
    formAlert.style.display = 'none';
  }

  /* clear field error on any change */
  function bindClear(input, msgEl) {
    var evts = ['input', 'change'];
    evts.forEach(function (ev) {
      input.addEventListener(ev, function () { fieldOk(input, msgEl); clearFormAlert(); });
    });
  }
  bindClear(firstEl,   document.getElementById('err-first'));
  bindClear(lastEl,    document.getElementById('err-last'));
  bindClear(emailEl,   document.getElementById('err-email'));
  bindClear(countryEl, document.getElementById('err-country'));
  consentEl.addEventListener('change', function () {
    fieldOk(consentEl, document.getElementById('err-consent'));
    consentRow.style.borderColor = '';
    consentRow.style.background  = '';
    clearFormAlert();
  });

  /* --- validate all fields; returns true if clean --- */
  function validate() {
    var ok = true;
    var first   = firstEl.value.trim();
    var last    = lastEl.value.trim();
    var email   = emailEl.value.trim();
    var country = countryEl.value;
    var errFirst   = document.getElementById('err-first');
    var errLast    = document.getElementById('err-last');
    var errEmail   = document.getElementById('err-email');
    var errCountry = document.getElementById('err-country');
    var errConsent = document.getElementById('err-consent');

    if (!first) {
      fieldErr(firstEl, errFirst, 'Please enter your first name.');
      ok = false;
    }
    if (!last) {
      fieldErr(lastEl, errLast, 'Please enter your last name.');
      ok = false;
    }
    if (!email) {
      fieldErr(emailEl, errEmail, 'Please enter your email address.');
      ok = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      /* (c) invalid email format - inline, stay on page */
      fieldErr(emailEl, errEmail, 'Please enter a valid email address (e.g. name@example.com).');
      ok = false;
    }
    if (!country) {
      fieldErr(countryEl, errCountry, 'Please select your country.');
      ok = false;
    }
    if (!consentEl.checked) {
      fieldErr(consentEl, errConsent, 'You must agree to marketing communications to create an account.');
      consentRow.style.borderColor = 'var(--c-danger)';
      consentRow.style.background  = 'var(--c-danger-wash)';
      ok = false;
    }
    if (!ok) {
      var firstInvalid = document.querySelector('.input.is-error, #marketing-consent.is-error');
      if (firstInvalid) firstInvalid.focus();
    }
    return ok;
  }

  /* --- simulate OTP send (replace with real API call) --- */
  function sendOtp(email, onSuccess, onError) {
    /* Stub: in production replace this with a fetch() to your auth endpoint.
       Error scenarios:
         code "EMAIL_EXISTS"     -> (a) email already registered
         code "DUPLICATE"        -> (b) duplicate signup (race condition)
         code "OTP_FAILED"       -> (d) OTP-send failure (email delivery error)
    */
    /* For prototype purposes, immediately call onSuccess so flow continues. */
    onSuccess();
  }

  btn.addEventListener('click', function () {
    clearFormAlert();
    if (!validate()) return;

    var email   = emailEl.value.trim();
    var first   = firstEl.value.trim();
    var last    = lastEl.value.trim();
    var country = countryEl.value;

    btn.disabled    = true;
    btn.textContent = 'Sending…';

    sendOtp(email, function () {
      /* success: store and proceed to OTP screen */
      sessionStorage.setItem('imi_email',   email);
      sessionStorage.setItem('imi_first',   first);
      sessionStorage.setItem('imi_last',    last);
      sessionStorage.setItem('imi_country', country);
      window.location.href = 'otp.html';
    }, function (code) {
      btn.disabled    = false;
      btn.textContent = 'Send OTP →';

      var errEmail = document.getElementById('err-email');
      if (code === 'EMAIL_EXISTS') {
        /* (a) email already registered - inline under email field */
        fieldErr(emailEl, errEmail,
          'An account with this email already exists. Sign in instead or use a different address.');
        emailEl.focus();
      } else if (code === 'DUPLICATE') {
        /* (b) duplicate signup - inline under email field */
        fieldErr(emailEl, errEmail,
          'This email was just registered. Please check your inbox for the verification code or sign in.');
        emailEl.focus();
      } else if (code === 'OTP_FAILED') {
        /* (d) OTP-send failure - form-level alert, field stays clean */
        showFormAlert(
          'We could not send a verification code to this address right now. Please check the email and try again, or contact support if the issue continues.');
      } else {
        /* generic server error - form-level alert */
        showFormAlert('Something went wrong. Please try again in a moment.');
      }
    });
  });

  emailEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') btn.click(); });
})();
</script>
<script src="../ui-enhance.js"></script>
</body>
</html>
