<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: var(--bg); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }

  /* top strip */
  .sa-top {
    padding: 18px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(250, 246, 240, 0.92);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
  }
  .sa-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .sa-brand img { height: 28px; width: auto; display: block; }
  .sa-brand-text {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .sa-brand-sub {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    color: var(--ink-soft);
    margin-left: 2px;
  }

  /* centered layout */
  .sa-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px 80px;
  }
  .sa-main { width: 100%; max-width: 480px; }

  /* auth card */
  .auth-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 44px 40px 36px;
    box-shadow: var(--shadow-card);
  }

  /* centered logo lockup at card top */
  .auth-lockup {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }
  .auth-lockup img { height: 38px; width: auto; display: block; }

  /* eyebrow + heading */
  .auth-eyebrow {
    font-family: var(--font-label);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 8px;
    text-align: center;
  }
  .auth-title {
    font-family: var(--font-sans);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 6px;
    text-align: center;
  }
  .auth-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--ink-soft);
  }
  .auth-sub {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 28px;
    text-align: center;
  }

  /* form field sizing */
  .auth-card .input { height: 46px; font-size: 14.5px; }
  .auth-card .field { margin-bottom: 20px; }
  .field label .req { color: var(--accent); margin-left: 2px; }

  /* name row */
  .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* primary CTA */
  .btn-full {
    width: 100%;
    justify-content: center;
    height: 48px;
    font-size: 14px;
    border-radius: var(--r-md);
  }

  /* consent checkbox row */
  .consent-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 22px;
    padding: 14px 16px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
  }
  .consent-row input[type="checkbox"] {
    margin-top: 2px;
    flex-shrink: 0;
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .consent-row label {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
    cursor: pointer;
  }

  /* divider */
  .auth-divider {
    height: 1px;
    background: var(--line);
    margin: 24px 0 20px;
  }

  /* footer links */
  .auth-foot {
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.6;
  }
  .auth-foot a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .auth-foot a:hover { color: var(--accent); }
  .auth-foot + .auth-foot { margin-top: 8px; }
  .auth-foot.help a { font-weight: 500; color: var(--ink-soft); }
  .auth-foot.help a:hover { color: var(--ink); }

  /* legal strip */
  .auth-legal {
    margin-top: 28px;
    text-align: center;
    font-family: var(--font-label);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink-mute);
    line-height: 1.7;
  }
  .auth-legal a { color: var(--ink-soft); text-decoration: underline; text-underline-offset: 2px; }
  .auth-legal a:hover { color: var(--ink); }
  .auth-legal .sep { color: var(--ink-faint); margin: 0 7px; }
  .auth-legal .copy { display: block; margin-top: 8px; color: var(--ink-faint); font-size: 10.5px; }
</style>
</head>
<body>

<!-- top navigation strip -->
<div class="sa-top">
  <a class="sa-brand" href="../learning/dashboard.html">
    <img src="../img/imi-mark-ink.png" alt="IMI">
    <span class="sa-brand-text">IMI</span>
    <span class="sa-brand-sub">Learning</span>
  </a>
</div>

<!-- centered auth card -->
<div class="sa-wrap">
  <main class="sa-main">

    <div class="auth-card">

      <!-- logo lockup -->
      <a class="auth-lockup" href="../learning/dashboard.html">
        <img src="../img/imi-logo.png" alt="IMI">
      </a>

      <!-- heading -->
      <p class="auth-eyebrow">Create account</p>
      <h1 class="auth-title">Join <em>IMI</em></h1>
      <p class="auth-sub">We'll send a one-time code to verify your email.</p>

      <!-- name row -->
      <div class="name-row">
        <div class="field">
          <label for="su-first">First Name <span class="req">*</span></label>
          <input class="input" id="su-first" type="text" placeholder="First name" autocomplete="given-name">
        </div>
        <div class="field">
          <label for="su-last">Last Name <span class="req">*</span></label>
          <input class="input" id="su-last" type="text" placeholder="Last name" autocomplete="family-name">
        </div>
      </div>

      <!-- email field -->
      <div class="field">
        <label for="su-email">Email address <span class="req">*</span></label>
        <input class="input" id="su-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <!-- country dropdown -->
      <div class="field">
        <label for="su-country">Country <span class="req">*</span></label>
        <select class="input" id="su-country" autocomplete="country-name">
          <option value="">Select country...</option>
          <option value="OM">Oman</option>
          <option value="AE">UAE</option>
          <option value="SA">Saudi Arabia</option>
          <option value="QA">Qatar</option>
          <option value="KW">Kuwait</option>
          <option value="BH">Bahrain</option>
          <option value="OT">Other</option>
        </select>
      </div>

      <!-- form error -->
      <div id="su-error" style="display:none;margin-bottom:14px;padding:10px 14px;background:var(--c-warn-wash,#fff4ec);border:1px solid var(--c-warn-soft,#f5c8a0);border-radius:var(--r-sm);font-size:12.5px;color:var(--c-warn-text,#b85200);font-weight:500;"></div>

      <!-- marketing consent -->
      <div class="consent-row" id="consent-row">
        <input type="checkbox" id="marketing-consent">
        <label for="marketing-consent">I agree to receive marketing communications from IMI by email. You must enable this consent to create an account.</label>
      </div>

      <!-- primary CTA -->
      <button class="btn btn-primary btn-full" id="btn-signup" type="button">Send OTP &rarr;</button>

      <div class="auth-divider"></div>

      <!-- footer links -->
      <p class="auth-foot">Already have an account? <a href="login.html">Sign in</a></p>
      <p class="auth-foot help"><a href="../profile/help-center.html">Need help?</a></p>

      <!-- legal -->
      <div class="auth-legal">
        <a href="../profile/help-center.html">Privacy Policy</a><span class="sep">&middot;</span><a href="../profile/help-center.html">Terms of Service</a><span class="sep">&middot;</span><a href="../profile/help-center.html">Terms &amp; Conditions</a>
        <span class="copy">IMI 2025</span>
      </div>

    </div><!-- /auth-card -->
  </main>
</div>

<script>
(function () {
  var firstEl = document.getElementById('su-first');
  var lastEl = document.getElementById('su-last');
  var emailEl = document.getElementById('su-email');
  var countryEl = document.getElementById('su-country');
  var consentEl = document.getElementById('marketing-consent');
  var consentRow = document.getElementById('consent-row');
  var errEl = document.getElementById('su-error');
  var btn = document.getElementById('btn-signup');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }
  function clearError() { errEl.style.display = 'none'; }

  [firstEl, lastEl, emailEl, countryEl, consentEl].forEach(function (el) {
    el.addEventListener('input', clearError);
    el.addEventListener('change', clearError);
  });

  btn.addEventListener('click', function () {
    var first = firstEl.value.trim();
    var last = lastEl.value.trim();
    var email = emailEl.value.trim();
    var country = countryEl.value;
    var consent = consentEl.checked;

    if (!first) { showError('Please enter your first name.'); firstEl.focus(); return; }
    if (!last) { showError('Please enter your last name.'); lastEl.focus(); return; }
    if (!email) { showError('Please enter your email address.'); emailEl.focus(); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email address.'); emailEl.focus(); return; }
    if (!country) { showError('Please select your country.'); countryEl.focus(); return; }
    if (!consent) {
      showError('You must agree to marketing communications to create an account.');
      consentRow.style.borderColor = 'var(--c-warn-soft, #f5c8a0)';
      consentRow.style.background = 'var(--c-warn-wash, #fff4ec)';
      return;
    }
    clearError();
    consentRow.style.borderColor = '';
    consentRow.style.background = '';
    sessionStorage.setItem('imi_email', email);
    sessionStorage.setItem('imi_first', first);
    sessionStorage.setItem('imi_last', last);
    sessionStorage.setItem('imi_country', country);
    window.location.href = 'otp.html';
  });

  emailEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') btn.click(); });
})();
</script>
<script src="../ui-enhance.js"></script>
</body>
</html>
