<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login error: locked · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: var(--bg); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }

  .sa-top {
    padding: 20px 40px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .sa-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .sa-brand img.logo-img { height: 28px; width: auto; display: block; }

  .sa-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px 80px;
  }
  .sa-main { width: 100%; max-width: 440px; }

  /* Error card */
  .err-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 40px 38px 36px;
    text-align: center;
  }

  .err-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--c-clay-wash);
    border: 2px solid rgba(184, 82, 62, 0.30);
    display: grid;
    place-items: center;
    margin: 0 auto 20px;
    color: var(--accent);
  }
  .err-icon svg { width: 28px; height: 28px; }

  .err-title {
    font-family: var(--font-sans);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .err-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .err-lead {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 28px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Unlock timer pill */
  .unlock-timer {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    background: var(--paper-2);
    border: 1px solid var(--line-strong);
    border-radius: var(--r-pill);
    padding: 8px 16px;
    font-family: var(--font-label);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    margin-bottom: 28px;
  }
  .unlock-timer svg { width: 14px; height: 14px; color: var(--ink-mute); flex-shrink: 0; }
  .unlock-timer strong { color: var(--ink); font-variant-numeric: tabular-nums; }

  /* Action buttons */
  .err-actions { display: flex; flex-direction: column; gap: 10px; }
  .err-actions .btn {
    display: flex;
    width: 100%;
    justify-content: center;
    height: 46px;
    font-size: 14px;
  }

  /* Divider */
  .err-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0;
  }
  .err-divider::before,
  .err-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .err-divider span {
    font-family: var(--font-label);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }

  /* Footer note */
  .err-foot {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-family: var(--font-label);
    font-size: 11.5px;
    color: var(--ink-mute);
    letter-spacing: 0.02em;
  }
  .err-foot a {
    color: var(--ink-soft);
    border-bottom: 1px solid var(--line-strong);
    padding-bottom: 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .err-foot a:hover { color: var(--ink); border-color: var(--ink); }
</style>
</head>
<body>

<div class="sa-top">
  <a class="sa-brand" href="login.html">
    <img src="../img/imi-logo.png" class="logo-img" alt="IMI">
  </a>
</div>

<div class="sa-wrap">
  <main class="sa-main">

    <div class="err-card" role="alertdialog" aria-labelledby="err-title">

      <div class="err-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <h1 class="err-title" id="err-title">Account <em>locked</em></h1>
      <p class="err-lead">Too many failed attempts. This account is temporarily locked for security.</p>

      <div class="unlock-timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Unlocks automatically in <strong id="unlock-timer-val">23 hr 47 min</strong>
      </div>

      <div class="err-actions">
        <a class="btn btn-primary" href="account-locked.html">View lock status</a>
        <div class="err-divider"><span>or</span></div>
        <a class="btn btn-ghost" href="../profile/help-center.html">Contact support</a>
      </div>

      <p class="err-foot">
        Wrong account? <a href="login.html">Back to login</a>
      </p>

    </div>

  </main>
</div>

<script>
(function () {
  var LOCK_KEY = 'imi_lock_until';
  var stored = localStorage.getItem(LOCK_KEY);
  var unlockAt = stored ? parseInt(stored, 10) : Date.now() + (23 * 3600 + 47 * 60) * 1000;
  if (!stored) localStorage.setItem(LOCK_KEY, unlockAt);
  var el = document.getElementById('unlock-timer-val');
  function update() {
    var rem = Math.max(0, Math.floor((unlockAt - Date.now()) / 1000));
    var h = Math.floor(rem / 3600);
    var m = Math.floor((rem % 3600) / 60);
    if (rem === 0) { el.textContent = 'now'; return; }
    el.textContent = h > 0 ? h + ' hr ' + m + ' min' : m + ' min';
  }
  update();
  setInterval(update, 30000);
})();
</script>
<script src="../ui-enhance.js"></script>
</body>
</html>
