<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup error: invalid email format · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: var(--bg); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── centered auth top bar ── */
  .auth-top {
    padding: 20px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(250, 246, 240, 0.92);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .auth-logo img.lockup { height: 32px; width: auto; display: block; }

  /* ── centering wrapper ── */
  .auth-wrap {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px 80px;
  }
  .auth-main { width: 100%; max-width: 480px; }

  /* ── card ── */
  .auth-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 40px 38px 34px;
    text-align: center;
  }

  /* ── eyebrow ── */
  .auth-eyebrow {
    font-family: var(--font-label);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 22px;
  }

  /* ── error icon ── */
  .auth-icon {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--c-danger-wash);
    border: 2px solid var(--c-danger);
    color: var(--c-danger);
    display: grid;
    place-items: center;
    margin: 0 auto 20px;
  }
  .auth-icon svg { width: 26px; height: 26px; }

  /* ── heading ── */
  .auth-title {
    font-family: var(--font-sans);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .auth-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--ink-soft);
  }

  /* ── body copy ── */
  .auth-body {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.55;
    max-width: 360px;
    margin: 0 auto 24px;
  }

  /* ── field ── */
  .auth-field {
    text-align: left;
    margin-bottom: 22px;
  }
  .auth-field label {
    display: block;
    font-family: var(--font-label);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 7px;
  }
  .auth-input {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    border: 1.5px solid var(--c-danger);
    background: var(--paper);
    border-radius: var(--r-sm);
    font-size: 14px;
    color: var(--ink);
    box-shadow: 0 0 0 3px var(--c-danger-wash);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .auth-input:focus {
    outline: none;
    border-color: var(--c-danger-deep);
    box-shadow: 0 0 0 4px var(--c-danger-wash);
  }

  /* ── inline error message ── */
  .auth-error {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--c-danger);
  }
  .auth-error svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* ── primary button ── */
  .auth-card .btn.full {
    width: 100%;
    justify-content: center;
    height: 46px;
    font-size: 14px;
  }

  /* ── footnote ── */
  .auth-note {
    font-size: 11.5px;
    color: var(--ink-mute);
    line-height: 1.5;
    margin-top: 16px;
  }

  /* ── divider ── */
  .auth-divider {
    width: 40px;
    height: 1px;
    background: var(--line);
    margin: 28px auto 0;
  }

  /* ── back link ── */
  .auth-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-label);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--ink-mute);
    text-decoration: none;
    margin-top: 20px;
    transition: color 0.15s;
  }
  .auth-back:hover { color: var(--ink); }
  .auth-back svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<div class="auth-top">
  <a class="auth-logo" href="../learning/dashboard.html">
    <img src="../img/imi-logo.png" class="lockup" alt="IMI">
  </a>
</div>

<div class="auth-wrap">
  <main class="auth-main">

    <div class="auth-card">

      <div class="auth-eyebrow">Create your account</div>

      <div class="auth-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>

      <h1 class="auth-title">Check the <em>email</em> format</h1>

      <p class="auth-body">That doesn't look like a valid email address. Make sure you've included an @ and a domain (e.g. you@example.com).</p>

      <form id="email-form" action="signup.html" method="get" onsubmit="return validateEmail(event)" novalidate>
        <div class="auth-field">
          <label for="email">Email address</label>
          <input
            class="auth-input"
            id="email"
            type="email"
            value="salman.imi"
            aria-invalid="true"
            aria-describedby="email-err"
            oninput="clearError()"
          >
          <div class="auth-error" id="email-err" role="alert">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="email-err-text">Enter a complete email address with an @ and domain.</span>
          </div>
        </div>

        <button class="btn btn-primary full" type="submit">Edit email</button>
      </form>

      <p class="auth-note">We validate format before sending an OTP, to avoid wasted codes.</p>

      <div class="auth-divider"></div>

      <a class="auth-back" href="login.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to login
      </a>

    </div>

  </main>
</div>

<script>
function validateEmail(e) {
  var input = document.getElementById('email');
  var errBox = document.getElementById('email-err');
  var errText = document.getElementById('email-err-text');
  var val = input.value.trim();
  var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  if (!valid) {
    e.preventDefault();
    input.setAttribute('aria-invalid', 'true');
    input.style.borderColor = 'var(--c-danger)';
    errBox.style.display = 'flex';
    errText.textContent = 'Enter a complete email address with an @ and domain.';
    input.focus();
    return false;
  }
  input.name = 'email';
  if (window.imiToast) window.imiToast('Looks good! Taking you back to sign up...');
  return true;
}
function clearError() {
  var input = document.getElementById('email');
  var errBox = document.getElementById('email-err');
  var val = input.value.trim();
  var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  if (valid) {
    input.removeAttribute('aria-invalid');
    input.style.borderColor = '';
    errBox.style.display = 'none';
  }
}
</script>
<script src="../ui-enhance.js"></script>
</body>
</html>
