<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resend OTP · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: var(--bg); margin: 0; min-height: 100vh; }

  /* ---- auth shell ---- */
  .sa-top {
    padding: 20px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(250, 246, 240, 0.92);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .sa-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .sa-brand img {
    height: 28px;
    width: auto;
    display: block;
  }
  .sa-brand-text {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .sa-brand-sub {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    color: var(--ink-soft);
    margin-left: 2px;
  }
  .sa-wrap {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px 96px;
  }
  .sa-main { width: 100%; max-width: 460px; }

  /* ---- auth card ---- */
  .auth-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 44px 40px 36px;
    text-align: center;
  }

  /* logo mark at top of card */
  .auth-logo {
    display: block;
    height: 36px;
    width: auto;
    margin: 0 auto 28px;
  }

  /* eyebrow */
  .auth-eyebrow {
    font-family: var(--font-label);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 20px;
  }

  /* resent success banner */
  .resent-banner {
    background: var(--c-sage-wash);
    border: 1px solid var(--c-sage-soft);
    border-radius: var(--r-md);
    padding: 14px 18px;
    margin-bottom: 28px;
    text-align: center;
  }
  .rb-head {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--c-sage-text);
    letter-spacing: -0.005em;
  }
  .rb-head svg { width: 16px; height: 16px; flex-shrink: 0; }
  .rb-sub {
    font-size: 12.5px;
    color: var(--c-sage-text);
    margin-top: 5px;
    line-height: 1.5;
  }
  .rb-email {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 500;
  }

  /* heading */
  .auth-title {
    font-family: var(--font-sans);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.022em;
    line-height: 1.18;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .auth-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  /* expiry line */
  .auth-expiry {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 28px;
  }
  .auth-expiry strong {
    color: var(--ink);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* OTP inputs */
  .otp-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .otp-box {
    width: 50px;
    height: 58px;
    text-align: center;
    font-family: var(--font-sans);
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    border: 1px solid var(--line-strong);
    border-radius: var(--r-sm);
    background: var(--paper-2);
    transition: border 0.18s, box-shadow 0.18s, background 0.18s;
  }
  .otp-box:focus {
    outline: none;
    border-color: var(--ink-mute);
    background: #fff;
    box-shadow: 0 0 0 4px var(--focus-ring);
  }
  .otp-box.is-cursor {
    border: 2px solid var(--ink);
    background: #fff;
  }
  .otp-box.filled {
    background: var(--paper);
    border-color: var(--ink-mute);
  }
  .otp-box:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(184, 82, 62, 0.10);
    background: var(--paper);
  }
  .otp-box { caret-color: transparent; }

  /* verify button */
  .btn.full {
    width: 100%;
    justify-content: center;
    padding: 13px 18px;
    font-size: 14px;
  }

  /* divider */
  .auth-divider {
    height: 1px;
    background: var(--line);
    margin: 28px 0 20px;
  }

  /* bottom copy */
  .auth-resend {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .resend-timer {
    color: var(--ink);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .auth-help {
    font-size: 12.5px;
    margin-top: 10px;
    color: var(--ink-mute);
  }
  .auth-help a {
    color: var(--ink);
    font-weight: 600;
    border-bottom: 1px solid var(--line-strong);
    padding-bottom: 1px;
    transition: color 0.18s, border-color 0.18s;
  }
  .auth-help a:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="sa-top">
  <a class="sa-brand" href="../learning/dashboard.html" aria-label="IMI Home">
    <img src="../img/imi-mark-ink.png" alt="IMI">
    <span class="sa-brand-text">IMI</span>
    <span class="sa-brand-sub">Learning</span>
  </a>
</div>

<div class="sa-wrap">
  <main class="sa-main">

    <div class="auth-card">

      <p class="auth-eyebrow">Sign up + Sign in · Resend flow</p>

      <div class="resent-banner">
        <div class="rb-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          <span>New code sent. Check your inbox.</span>
        </div>
        <p class="rb-sub">A fresh 6-digit code has been sent to <span class="rb-email" id="resend-dest">salman@webinnoventix.com</span></p>
      </div>

      <h1 class="auth-title">Check your <em>inbox</em></h1>
      <p class="auth-expiry">Code expires in <strong id="resend-expiry">10:00</strong></p>

      <div class="otp-row" id="otp-row">
        <input class="otp-box is-cursor" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Digit 1">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6">
      </div>

      <div id="resend-error" style="display:none;margin-bottom:12px;font-size:12.5px;color:var(--c-warn-text,#b85200);font-weight:500;text-align:center;"></div>

      <button class="btn btn-primary full" id="btn-verify" type="button">Verify &rarr;</button>

      <div class="auth-divider"></div>

      <p class="auth-resend">Still not received? <span class="resend-timer" id="resend-cd-text">Resend available in <strong id="resend-cd">0:58</strong></span><button id="btn-resend-again" class="btn btn-ghost btn-sm" type="button" style="display:none;font-size:13px;">Send another code</button></p>
      <p class="auth-help"><a href="../profile/help-center.html">Need help?</a></p>

    </div>

  </main>
</div>

<script>
(function () {
  var emailDest = document.getElementById('resend-dest');
  var storedEmail = sessionStorage.getItem('imi_email');
  if (emailDest && storedEmail) emailDest.textContent = storedEmail;

  var boxes = Array.from(document.querySelectorAll('.otp-box'));
  var expiryEl = document.getElementById('resend-expiry');
  var errEl = document.getElementById('resend-error');
  var btnVerify = document.getElementById('btn-verify');
  var cdTextEl = document.getElementById('resend-cd-text');
  var cdEl = document.getElementById('resend-cd');
  var btnAgain = document.getElementById('btn-resend-again');

  /* OTP wiring */
  boxes.forEach(function (box, i) {
    box.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace') {
        if (box.value === '' && i > 0) { boxes[i - 1].focus(); boxes[i - 1].value = ''; }
        box.value = '';
        updateFilled();
        e.preventDefault();
      } else if (e.key === 'ArrowLeft' && i > 0) {
        boxes[i - 1].focus(); e.preventDefault();
      } else if (e.key === 'ArrowRight' && i < boxes.length - 1) {
        boxes[i + 1].focus(); e.preventDefault();
      }
    });

    box.addEventListener('input', function () {
      var v = box.value.replace(/\D/g, '');
      if (v.length > 1) {
        var digits = v.split('');
        digits.forEach(function (d, j) { if (boxes[i + j]) boxes[i + j].value = d; });
        var next = Math.min(i + digits.length, boxes.length - 1);
        boxes[next].focus();
      } else {
        box.value = v;
        if (v && i < boxes.length - 1) boxes[i + 1].focus();
      }
      updateFilled();
    });

    box.addEventListener('focus', function () { box.select(); });
  });

  function updateFilled() {
    boxes.forEach(function (b) { b.classList.toggle('filled', b.value !== ''); });
    clearError();
  }

  function showError(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
  function clearError() { errEl.style.display = 'none'; }

  /* expiry countdown */
  var expiryLeft = 600;
  var expiryIv = setInterval(function () {
    expiryLeft--;
    if (expiryLeft <= 0) {
      clearInterval(expiryIv);
      expiryEl.textContent = '0:00';
      expiryEl.style.color = 'var(--c-warn-text, #b85200)';
      showError('This code has expired. Request a new one.');
      btnVerify.disabled = true;
    } else {
      var m = Math.floor(expiryLeft / 60);
      var s = expiryLeft % 60;
      expiryEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }
  }, 1000);

  /* resend cooldown */
  var cdLeft = 58;
  var cdIv = setInterval(function () {
    cdLeft--;
    if (cdLeft <= 0) {
      clearInterval(cdIv);
      cdTextEl.style.display = 'none';
      btnAgain.style.display = 'inline-flex';
    } else {
      cdEl.textContent = '0:' + (cdLeft < 10 ? '0' : '') + cdLeft;
    }
  }, 1000);

  btnAgain.addEventListener('click', function () {
    window.location.reload();
  });

  /* verify */
  btnVerify.addEventListener('click', function () {
    var code = boxes.map(function (b) { return b.value; }).join('');
    if (code.length < 6) {
      showError('Please enter all 6 digits of your code.');
      var emptyIdx = boxes.findIndex(function (b) { return b.value === ''; });
      if (emptyIdx >= 0) boxes[emptyIdx].focus();
      return;
    }
    clearError();
    btnVerify.textContent = 'Verifying...';
    btnVerify.disabled = true;
    /* Prototype: route to email-verification for new signups, dashboard for returning logins */
    var isSignup = sessionStorage.getItem('imi_first') || sessionStorage.getItem('imi_last');
    setTimeout(function () {
      window.location.href = isSignup ? 'email-verification.html' : '../learning/dashboard.html';
    }, 800);
  });

  boxes[0].focus();
})();
</script>
<script src="../ui-enhance.js"></script>
</body>
</html>
