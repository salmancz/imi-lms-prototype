<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: var(--bg); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── top strip ── */
  .sa-top {
    padding: 18px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(250, 246, 240, 0.92);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
  }
  .sa-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .sa-brand img { height: 28px; width: auto; display: block; }
  .sa-brand-text {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .sa-brand-sub {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    color: var(--ink-soft);
    margin-left: 2px;
  }

  /* ── centered layout ── */
  .sa-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px 80px;
  }
  .sa-main { width: 100%; max-width: 460px; }

  /* ── auth card ── */
  .auth-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 44px 40px 36px;
    box-shadow: var(--shadow-card);
  }

  /* centered logo lockup at card top */
  .auth-lockup {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }
  .auth-lockup img { height: 38px; width: auto; display: block; }

  /* eyebrow + heading */
  .auth-eyebrow {
    font-family: var(--font-label);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 8px;
    text-align: center;
  }
  .auth-title {
    font-family: var(--font-sans);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 6px;
    text-align: center;
  }
  .auth-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--ink-soft);
  }
  .auth-sub {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 28px;
    text-align: center;
  }

  /* form field sizing */
  .auth-card .input { height: 46px; font-size: 14.5px; }
  .auth-card .field { margin-bottom: 20px; }

  /* primary CTA */
  .auth-card .btn-full {
    width: 100%;
    justify-content: center;
    height: 48px;
    font-size: 14px;
    border-radius: var(--r-md);
  }

  /* divider */
  .auth-divider {
    height: 1px;
    background: var(--line);
    margin: 24px 0 20px;
  }

  /* footer links */
  .auth-foot {
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.6;
  }
  .auth-foot a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .auth-foot + .auth-foot { margin-top: 8px; }
  .auth-foot.help a { font-weight: 500; color: var(--ink-soft); }
  .auth-foot.help a:hover { color: var(--ink); }

  /* legal strip */
  .auth-legal {
    margin-top: 28px;
    text-align: center;
    font-family: var(--font-label);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink-mute);
    line-height: 1.7;
  }
  .auth-legal a { color: var(--ink-soft); text-decoration: underline; text-underline-offset: 2px; }
  .auth-legal a:hover { color: var(--ink); }
  .auth-legal .sep { color: var(--ink-faint); margin: 0 7px; }
  .auth-legal .copy { display: block; margin-top: 8px; color: var(--ink-faint); font-size: 10.5px; }
</style>
</head>
<body>

<!-- top navigation strip -->
<div class="sa-top">
  <a class="sa-brand" href="../learning/dashboard.html">
    <img src="../img/imi-mark-ink.png" alt="IMI">
    <span class="sa-brand-text">IMI</span>
    <span class="sa-brand-sub">Learning</span>
  </a>
</div>

<!-- centered auth card -->
<div class="sa-wrap">
  <main class="sa-main">

    <div class="auth-card">

      <!-- logo lockup -->
      <a class="auth-lockup" href="../learning/dashboard.html">
        <img src="../img/imi-logo.png" alt="IMI">
      </a>

      <!-- heading -->
      <p class="auth-eyebrow">Welcome back</p>
      <h1 class="auth-title">Sign in to <em>continue</em></h1>
      <p class="auth-sub">We'll send you a one-time code by email.</p>

      <!-- email field -->
      <div class="field" id="email-field">
        <label for="login-email">Email address</label>
        <input class="input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
        <div id="email-error" style="display:none;margin-top:6px;font-size:12.5px;color:var(--c-warn-text,#b85200);font-weight:500;"></div>
      </div>

      <!-- primary CTA -->
      <button class="btn btn-primary btn-full" id="btn-send-otp" type="button">Send OTP &rarr;</button>

      <div class="auth-divider"></div>

      <!-- footer links -->
      <p class="auth-foot">New to IMI? <a href="signup.html">Create account</a></p>
      <p class="auth-foot help"><a href="../profile/help-center.html">Need help?</a></p>

      <!-- legal -->
      <div class="auth-legal">
        <a href="../profile/help-center.html">Privacy Policy</a><span class="sep">&middot;</span><a href="../profile/help-center.html">Terms of Service</a><span class="sep">&middot;</span><a href="../profile/help-center.html">Terms &amp; Conditions</a>
        <span class="copy">IMI 2025</span>
      </div>

    </div><!-- /auth-card -->
  </main>
</div>

<script>
(function () {
  var emailEl = document.getElementById('login-email');
  var errEl = document.getElementById('email-error');
  var btn = document.getElementById('btn-send-otp');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
    emailEl.style.borderColor = 'var(--c-warn-text, #b85200)';
  }
  function clearError() {
    errEl.style.display = 'none';
    emailEl.style.borderColor = '';
  }

  emailEl.addEventListener('input', clearError);

  btn.addEventListener('click', function () {
    var val = emailEl.value.trim();
    if (!val) {
      showError('Please enter your email address.');
      emailEl.focus();
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      showError('Please enter a valid email address.');
      emailEl.focus();
      return;
    }
    clearError();
    sessionStorage.setItem('imi_email', val);
    sessionStorage.removeItem('imi_first');
    sessionStorage.removeItem('imi_last');
    window.location.href = 'otp.html';
  });

  emailEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') btn.click();
  });
})();
</script>
<script src="../ui-enhance.js"></script>
</body>
</html>
