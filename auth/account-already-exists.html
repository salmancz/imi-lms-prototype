<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account already exists · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: var(--bg); margin: 0; min-height: 100vh; }

  /* Auth page top bar: centered logo lockup */
  .sa-top {
    padding: 24px 40px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .sa-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .sa-brand img {
    height: 32px;
    width: auto;
    display: block;
  }

  /* Centered content wrapper */
  .sa-wrap {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px 80px;
    min-height: calc(100vh - 81px);
  }
  .sa-main {
    width: 100%;
    max-width: 440px;
  }

  /* Auth card */
  .auth-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 44px 40px 40px;
    text-align: center;
  }

  /* Icon mark */
  .auth-mark {
    width: 56px;
    height: 56px;
    margin: 0 auto 24px;
    border-radius: 16px;
    background: var(--c-clay-wash);
    color: var(--accent);
    display: grid;
    place-items: center;
    border: 1px solid rgba(184, 101, 78, 0.18);
  }
  .auth-mark svg { width: 26px; height: 26px; }

  /* Eyebrow */
  .auth-eyebrow {
    font-family: var(--font-label);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 10px;
  }

  /* Title */
  .auth-title {
    font-family: var(--font-sans);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.18;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .auth-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
  }

  /* Body message */
  .auth-msg {
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 28px;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }
  .auth-msg strong {
    color: var(--ink);
    font-weight: 700;
  }

  /* Full-width button */
  .auth-card .btn.full {
    display: flex;
    width: 100%;
    justify-content: center;
    padding: 13px 18px;
    font-size: 14px;
  }

  /* Divider */
  .auth-divider {
    height: 1px;
    background: var(--line);
    margin: 24px 0 18px;
  }

  /* Footer text */
  .auth-foot {
    font-size: 13px;
    color: var(--ink-mute);
  }
  .auth-foot a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .auth-foot a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="sa-top">
  <a class="sa-brand" href="../learning/dashboard.html">
    <img src="../img/imi-logo.png" alt="IMI">
  </a>
</div>

<div class="sa-wrap">
  <main class="sa-main">
    <div class="auth-card">

      <div class="auth-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>

      <div class="auth-eyebrow">Sign up</div>
      <h1 class="auth-title">Account <em>already</em> exists</h1>
      <p class="auth-msg">An account with <strong>salman@webinnoventix.com</strong> already exists.</p>

      <a class="btn btn-primary full" href="login.html">Sign in instead &rarr;</a>

      <div class="auth-divider"></div>

      <p class="auth-foot">Forgot your account? <a href="../profile/help-center.html">Need help?</a></p>

    </div>
  </main>
</div>

<script src="../ui-enhance.js"></script>
</body>
</html>
