<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup error: OTP failed · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body {
    background: var(--bg);
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* top strip - matches login.html approved pattern */
  .sa-top {
    padding: 18px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(250, 246, 240, 0.92);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
  }
  .sa-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .sa-brand img { height: 32px; width: auto; display: block; }
  .sa-brand-text {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .sa-brand-sub {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    color: var(--ink-soft);
    margin-left: 2px;
  }

  /* centered layout */
  .sa-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px 80px;
  }
  .sa-main { width: 100%; max-width: 460px; }

  /* auth card */
  .auth-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 44px 40px 36px;
    box-shadow: var(--shadow-card);
    text-align: center;
  }

  /* centered logo lockup at card top */
  .auth-lockup {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }
  .auth-lockup img { height: 38px; width: auto; display: block; }

  /* error icon */
  .auth-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--c-clay-wash);
    border: 2px solid var(--c-clay-soft);
    color: var(--accent-deep);
    display: grid;
    place-items: center;
    margin: 0 auto 20px;
  }
  .auth-icon svg { width: 28px; height: 28px; }

  /* heading */
  .auth-eyebrow {
    font-family: var(--font-label);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 8px;
  }
  .auth-title {
    font-family: var(--font-sans);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .auth-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .auth-sub {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 360px;
    margin: 0 auto 28px;
  }

  /* actions */
  .auth-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .auth-actions .btn {
    justify-content: center;
    width: 100%;
    padding: 12px 18px;
    font-size: 14px;
  }

  /* footer note */
  .auth-foot {
    font-family: var(--font-label);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: var(--ink-mute);
    margin-top: 20px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="sa-top">
  <a class="sa-brand" href="login.html">
    <img src="../img/imi-mark-ink.png" alt="IMI">
    <span class="sa-brand-text">IMI</span>
    <span class="sa-brand-sub">Learning</span>
  </a>
</div>

<div class="sa-wrap">
  <main class="sa-main">
    <div class="auth-card">

      <div class="auth-lockup">
        <img src="../img/imi-logo.png" alt="IMI">
      </div>

      <div class="auth-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>

      <p class="auth-eyebrow">Verification Error</p>
      <h1 class="auth-title">OTP verification <em>failed</em></h1>
      <p class="auth-sub">We could not verify the code you entered. The signup was not completed and no account has been created.</p>

      <div class="auth-actions">
        <a class="btn btn-primary" href="signup.html">Start over</a>
        <a class="btn btn-ghost" href="otp.html">Try again</a>
      </div>

      <p class="auth-foot">No account is created until OTP is verified.</p>

    </div>
  </main>
</div>

<script src="../ui-enhance.js"></script>
</body>
</html>
