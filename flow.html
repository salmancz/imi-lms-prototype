<style>
:root{--bg:#F6F3EC;--ink:#2A1108;--mute:#7a6a58;--line:#e7ddcb;--accent:#B8523E}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Switzer,system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
#bar{position:fixed;inset:0 0 auto 0;z-index:10;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:9px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#bar h1{font-size:14px;margin:0;font-weight:700}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{border:1.5px solid var(--line);background:#fff;border-radius:100px;padding:5px 13px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--mute)}
.tab b{color:var(--ink)}.tab:hover{border-color:var(--pc);color:var(--pc)}
.tab.on{background:var(--pc);border-color:var(--pc);color:#fff}.tab.on b{color:#fff}
.sp{flex:1}
#search{height:32px;border:1px solid var(--line);border-radius:100px;padding:0 13px;font:inherit;font-size:13px;width:160px;outline:none}
#search:focus{border-color:var(--accent)}
.btn{height:32px;border:1px solid var(--line);background:#fff;border-radius:100px;padding:0 13px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink)}
.btn:hover{border-color:var(--accent);color:var(--accent)}
label.chk{font-size:12px;color:var(--ink);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;white-space:nowrap}
#cnt{font-size:11.5px;color:var(--mute)}
#cy{position:fixed;inset:50px 0 0 0}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#FBF7EF;font-size:12px;padding:7px 16px;border-radius:100px;z-index:8;opacity:.92}
</style></head>

try{ if(window.cytoscapeDagre) cytoscape.use(window.cytoscapeDagre); }catch(e){}
var cy = cytoscape({ container:document.getElementById('cy'), elements:ELE, wheelSensitivity:0.25,
  style:[
    {selector:'node',style:{'background-color':'#fff','border-width':2.5,'border-color':'data(color)','label':'data(label)','color':'#2A1108','font-size':12,'font-weight':600,'text-wrap':'wrap','text-max-width':'140px','text-valign':'center','text-halign':'center','shape':'round-rectangle','width':'label','height':'label','padding':'11px'}},
    {selector:'node[entry=1]',style:{'background-color':'data(color)','color':'#fff','border-width':0,'font-weight':700,'font-size':13}},
    {selector:'edge',style:{'display':'none'}},
    {selector:'edge[tree=1]',style:{'width':2,'line-color':'#a89a83','target-arrow-color':'#a89a83','target-arrow-shape':'triangle','arrow-scale':1,'curve-style':'taxi','taxi-direction':'downward','taxi-turn':22,'opacity':0.9}},
    {selector:'edge[link=1]',style:{'width':1,'line-color':'#dcd2c0','target-arrow-color':'#dcd2c0','target-arrow-shape':'triangle','arrow-scale':0.7,'curve-style':'bezier','opacity':0.45}},
    {selector:'.dim',style:{'opacity':0.07}},
    {selector:'.hl',style:{'border-width':5,'border-color':'#B8523E','z-index':99}},
    {selector:'.hle',style:{'line-color':'#B8523E','target-arrow-color':'#B8523E','width':3,'opacity':1,'z-index':99}}
  ]});
cy.on('tap','node',function(e){ var u=e.target.data('url'); if(u) window.open(u,'_blank','noopener'); });
cy.on('mouseover','node',function(e){ e.target.addClass('hl'); e.target.connectedEdges(':visible').addClass('hle'); });
cy.on('mouseout','node',function(){ cy.elements().removeClass('hl hle'); });
var cur='learner';
function show(pkey){
  cur=pkey;
  var showAll=document.getElementById('togAll').checked;
  cy.batch(function(){
    cy.elements().style('display','none').removeClass('dim hl hle');
    var ns = pkey==='all'?cy.nodes():cy.nodes('[persona="'+pkey+'"]');
    ns.style('display','element');
    var vis={}; ns.forEach(function(n){vis[n.id()]=1;});
    cy.edges().forEach(function(ed){
      if(!(vis[ed.source().id()]&&vis[ed.target().id()]))return;
      if(ed.data('tree')===1 || (showAll && ed.data('link')===1)) ed.style('display','element');
    });
  });
  var vis=cy.elements(':visible');
  vis.layout({name:'dagre',rankDir:'TB',nodeSep:24,rankSep:70,edgeSep:12,ranker:'tight-tree',animate:false,fit:true,padding:40}).run();
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.p===pkey);});
  document.getElementById('cnt').textContent = vis.nodes().length+' pages';
}
document.querySelectorAll('.tab').forEach(function(t){ t.onclick=function(){ show(t.dataset.p); }; });
document.getElementById('togAll').onchange=function(){ show(cur); };
document.getElementById('fit').onclick=function(){ cy.fit(cy.elements(':visible'),40); };
document.getElementById('search').oninput=function(){ var q=this.value.trim().toLowerCase(); var vis=cy.elements(':visible'); vis.removeClass('dim hl');
  if(!q)return; var m=cy.nodes(':visible').filter(function(n){return n.data('label').toLowerCase().indexOf(q)>=0;});
  if(m.length){ vis.addClass('dim'); m.removeClass('dim').addClass('hl'); m.connectedEdges(':visible').removeClass('dim'); m.neighborhood(':visible').removeClass('dim'); cy.fit(m,140);} };
cy.ready(function(){ show('learner'); setTimeout(function(){ document.getElementById('hint').style.display='none'; },3000); });
