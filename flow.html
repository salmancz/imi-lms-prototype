<style>
:root{--bg:#F6F3EC;--paper:#fff;--ink:#2A1108;--mute:#7a6a58;--line:#e7ddcb;--accent:#B8523E}
*{box-sizing:border-box}body{margin:0;font-family:Switzer,system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
#bar{position:fixed;top:0;left:0;right:0;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#bar h1{font-size:15px;margin:0;font-weight:700;letter-spacing:-.01em}
#bar .meta{font-size:12px;color:var(--mute)}
#bar .sp{flex:1}
#search{height:32px;border:1px solid var(--line);border-radius:100px;padding:0 14px;font:inherit;font-size:13px;width:200px;outline:none}
#search:focus{border-color:var(--accent)}
.btn{height:32px;border:1px solid var(--line);background:#fff;border-radius:100px;padding:0 14px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink)}
.btn:hover{border-color:var(--accent);color:var(--accent)}
label.chk{font-size:12.5px;color:var(--ink);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
#legend{display:flex;gap:14px;flex-wrap:wrap;padding:7px 18px;background:rgba(255,255,255,.85);border-bottom:1px solid var(--line);position:fixed;top:53px;left:0;right:0;z-index:9}
.lg{font-size:11.5px;color:var(--mute);display:flex;align-items:center;gap:5px}.lg b{color:var(--ink)}
.lg i{width:11px;height:11px;border-radius:3px;display:inline-block}
#cy{position:fixed;top:90px;left:0;right:0;bottom:0}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#FBF7EF;font-size:12px;padding:7px 16px;border-radius:100px;z-index:8;opacity:.9}
</style></head>
