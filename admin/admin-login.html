<!DOCTYPE html>
<html lang="en" data-theme="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin login · IMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: var(--bg); margin: 0; min-height: 100vh; }
  .sa-top { padding: 24px 40px; }
  .sa-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .sa-brand img { height: 28px; width: auto; display: block; }
  .sa-wrap { display: flex; align-items: flex-start; justify-content: center; padding: 32px 20px 80px; }
  .sa-main { width: 100%; max-width: 480px; }

  /* auth card */
  .auth-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 40px 38px 36px;
  }
  .auth-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 26px;
  }
  .auth-logo img { height: 38px; width: auto; display: block; }
  .auth-logo .word {
    font-family: var(--font-label);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .auth-eyebrow {
    font-family: var(--font-label);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .auth-title {
    font-family: var(--font-sans);
    font-size: 33px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.12;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .auth-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .auth-sub {
    font-size: 14.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin-bottom: 26px;
  }
  .auth-card .input { height: 44px; font-size: 14px; }
  .auth-card .btn.full {
    display: flex;
    width: 100%;
    justify-content: center;
    height: 46px;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .auth-note {
    font-size: 12.5px;
    color: var(--ink-mute);
    text-align: center;
    line-height: 1.6;
  }
  .auth-foot {
    margin-top: 26px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .auth-foot svg { width: 16px; height: 16px; color: var(--c-sage); flex-shrink: 0; margin-top: 2px; }
</style>
</head>
<body>
<div class="sa-top"><a class="sa-brand" href="admin-dashboard.html"><img src="../img/imi-mark-ink.png" alt="IMI"><span>Admin</span></a></div>
<div class="sa-wrap"><main class="sa-main">
<div class="auth-card">
  <div class="auth-logo">
    <img src="../img/imi-logo.png" alt="IMI">
    <span class="word">Admin Console</span>
  </div>
  <div class="auth-eyebrow">Restricted access</div>
  <h1 class="auth-title">Sign in to the <em>console</em></h1>
  <p class="auth-sub">Sign in with your admin email and password.</p>
  <div class="field">
    <label for="admin-email">Admin email</label>
    <input class="input" id="admin-email" type="email" placeholder="admin@imi.om" autocomplete="username">
  </div>
  <div class="field">
    <label for="admin-password" style="display:flex;align-items:center;justify-content:space-between">
      <span>Password</span>
      <a href="admin-password-reset.html" style="font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;letter-spacing:0.01em" tabindex="-1">Forgot password?</a>
    </label>
    <div style="position:relative">
      <input class="input" id="admin-password" type="password" placeholder="Your password" autocomplete="current-password" style="padding-right:44px">
      <button type="button" id="pw-toggle" aria-label="Show password" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-mute);padding:4px;display:flex;align-items:center">
        <svg id="pw-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <button class="btn btn-primary full" id="sign-in-btn" type="button">Sign in &rarr;</button>
  <p class="auth-note" id="auth-note" style="min-height:18px"></p>
  <div class="auth-foot">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span>Sessions expire based on configurable timeout rules. Contact your Super Admin to reset your password.</span>
  </div>
</div>
</main></div>
<script>
(function() {
  var emailInput = document.getElementById('admin-email');
  var pwInput = document.getElementById('admin-password');
  var btn = document.getElementById('sign-in-btn');
  var note = document.getElementById('auth-note');
  var pwToggle = document.getElementById('pw-toggle');

  function setError(msg) {
    note.textContent = msg;
    note.style.color = 'var(--c-clay,#B8523E)';
  }
  function clearError() {
    note.textContent = '';
    note.style.color = '';
  }

  emailInput.addEventListener('input', clearError);
  pwInput.addEventListener('input', clearError);

  pwToggle.addEventListener('click', function() {
    var show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    pwToggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });

  btn.addEventListener('click', function() {
    var email = emailInput.value.trim();
    var pw = pwInput.value;
    if (!email) { setError('Please enter your admin email.'); emailInput.focus(); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('Enter a valid email address.'); emailInput.focus(); return; }
    if (!pw) { setError('Please enter your password.'); pwInput.focus(); return; }
    btn.textContent = 'Signing in...';
    btn.disabled = true;
    setTimeout(function() { location.href = 'admin-dashboard.html'; }, 800);
  });

  function onEnter(e) { if (e.key === 'Enter') btn.click(); }
  emailInput.addEventListener('keydown', onEnter);
  pwInput.addEventListener('keydown', onEnter);
})();
</script>
<script src="../ui-enhance.js"></script>
</body>
</html>
